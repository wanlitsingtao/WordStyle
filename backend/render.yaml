services:
  - type: web
    name: wordstyle-api
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://*.streamlit.app"
      - key: DEBUG
        value: "false"
      - key: UPLOAD_DIR
        value: "/tmp/uploads"
